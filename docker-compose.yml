services:
  app:
    build:
      context: ./car-office
      dockerfile: Dockerfile
      args:
        APP_ROOT: .
    ports:
      - "8000:8000"
    volumes:
      - ./car-office:/var/www/html
    depends_on:
      - postgres
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=car_rental
      - DB_USERNAME=pguser
      - DB_PASSWORD=pgpassword
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: car_rental
    ports:
      - "5409:5432"
    volumes:
        - postgres:/var/lib/postgresql/data/
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin:/var/lib/pgadmin
    restart: unless-stopped
volumes:
  postgres:
    driver: local
  pgadmin:
